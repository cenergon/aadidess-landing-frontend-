<section class="sponsors">
  <div class="sponsors__container">
    <h2 class="sponsors__title">Nuestros Sponsors</h2>
    <div class="sponsors__grid">
      @for (sponsor of sponsors; track sponsor.nombre) {
        <a
          [href]="sponsor.link"
          target="_blank"
          rel="noopener noreferrer"
          class="sponsors__card"
        >
          <img
            [src]="getLogoSrc(sponsor)"
            [alt]="sponsor.nombre"
            class="sponsors__logo"
            loading="lazy"
          />
          <span class="sponsors__name">{{ sponsor.nombre }}</span>
        </a>
      }
    </div>
  </div>
</section>
